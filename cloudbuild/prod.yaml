###############################################################################
# Cloud Build — production environment
# Trigger: push to `main` branch
#
# --no-traffic: new revision receives 0% traffic until manually promoted:
#   gcloud run services update-traffic gub-admin-prod \
#     --to-latest --region=us-central1
###############################################################################

substitutions:
  _REGION: us-central1
  _AR_REPO: gub-admin
  _SERVICE: gub-admin-prod
  _DB_SECRET: gub-admin-db-url-prod
  _CLOUDSQL_INSTANCE: gub-platform

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Type check ─────────────────────────────────────────────────────────
  - id: typecheck
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - npm ci && npx tsc --noEmit

  # ── 2. Build Docker image ─────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:latest
      - .
    waitFor: [typecheck]

  # ── 3. Push image ─────────────────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE
    waitFor: [build]

  # ── 4. Deploy to Cloud Run (no traffic — manual promotion required) ────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=1
      - --max-instances=4
      - --memory=512Mi
      - --cpu=1
      - --port=3000
      - --no-traffic
      - --service-account=sa-$_SERVICE@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID
      - --set-secrets=DATABASE_URL=$_DB_SECRET:latest
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
    waitFor: [push]

  # ── 5. Print promotion instructions ──────────────────────────────────────
  - id: instructions
    name: gcr.io/cloud-builders/docker
    entrypoint: sh
    args:
      - -c
      - |
        echo ""
        echo "========================================================="
        echo "  Production deploy complete — revision is at 0% traffic."
        echo ""
        echo "  Verify the new revision, then promote with:"
        echo ""
        echo "  gcloud run services update-traffic $_SERVICE \\"
        echo "    --to-latest \\"
        echo "    --region=$_REGION"
        echo "========================================================="
        echo ""
    waitFor: [deploy]
