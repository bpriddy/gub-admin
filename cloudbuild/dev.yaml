###############################################################################
# Cloud Build — dev environment
# Trigger: push to `dev` branch
###############################################################################

substitutions:
  _REGION: us-central1
  _AR_REPO: gub-admin
  _SERVICE: gub-admin-dev
  _DB_SECRET: gub-admin-db-url-dev
  _CLOUDSQL_INSTANCE: gub-platform
  _GUB_BACKEND_URL: https://gcp-universal-backend-dev-843516467880.us-central1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # ── 1. Type check ─────────────────────────────────────────────────────────
  - id: typecheck
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - npm ci && npx tsc --noEmit

  # ── 2. Build Docker image ─────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:latest
      - .
    waitFor: [typecheck]

  # ── 3. Push image ─────────────────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE
    waitFor: [build]

  # ── 4. Deploy to Cloud Run ────────────────────────────────────────────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=0
      - --max-instances=2
      - --memory=512Mi
      - --cpu=1
      - --port=3000
      - --service-account=sa-$_SERVICE@$PROJECT_ID.iam.gserviceaccount.com
      # NODE_ENV=production — this is a production-built Next.js container
      # (next build produces a production artifact). The "dev" in the service
      # name refers to the GCP project environment, not to NODE_ENV mode.
      # Setting NODE_ENV=development at runtime opts into dev-mode stack
      # traces + verbose errors, AND would weaken the IAP_DEV_EMAIL bypass
      # guard in src/lib/iap-dev-bypass.ts — it MUST stay 'production' on
      # every deployed Cloud Run revision.
      - --set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,GUB_BACKEND_URL=$_GUB_BACKEND_URL
      - --set-secrets=DATABASE_URL=$_DB_SECRET:latest
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
    waitFor: [push]
